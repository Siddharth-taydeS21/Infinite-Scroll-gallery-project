<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/Image-gallery-favicon.png" type="image/x-icon">

    <!-- ======================= REMIX ICON =========================== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">

    <!-- ======================= TAILWIND CSS =========================== -->
    <link rel="stylesheet" href="./CSS/output.css">

    <!--  ==================== MAIN JS FILE ===================== -->
    <title>Infinite Scroll Gallery</title>
</head>

<body>
    <header>
        <nav>
            <a href="#" class="logo flex items-center gap-2">
                <i class="ri-image-ai-fill text-2xl"></i>
                <span class="text-lg md:text-xl font-semibold">Image Gallery</span>
            </a>

            <div class="user_profile flex justify-center gap-2 items-center">
                <i class="ri-arrow-drop-down-line"></i>
                <h1 class="user_name hidden sm:flex">Siddharth</h1>
                <div class="image_warpper size-[35px] bg-gray-600 rounded-full overflow-hidden">
                    <img src="./assets/Image-gallery-favicon.png" alt="" class="user-Image">
                </div>
            </div>
        </nav>
    </header>

    <main>

        <section class="imag-grid">
            <div class="container grid gap-6">
                <div class="title_and_searchBar_container grid gap-3 sm:grid-cols-2">
                    <div class="section_title">Search for 'Cats'</div>

                    <label for="search-input"
                        class=" w-full border-2 border-gray-200 rounded p-[.5rem_1rem] sm:w-[300px] justify-self-end">
                        <i class="ri-search-2-line"></i>
                        <input type="text" id="search-input" placeholder="Search Photos"
                            class="border-none focus:outline-none focus:ring-0 p-l-2">
                    </label>
                </div>

                <div class="image_grid_parent border grid border-gray-200 rounded-lg p-4">
                    <div class="main_image_grid w-full grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">
                        <div class="col">

                        </div>

                        <div class="col">

                        </div>

                        <div class="col">

                        </div>
                    </div>
                </div>
                <div class="sentinel"></div>

                <!-- dummy images for testing -->
                <!-- <div class="grid_item"><img src="./assets/photo-1.avif" alt="image" srcset=""></div>
                        <div class="grid_item"><img src="./assets/photo-2.avif" alt="image" srcset=""></div>
                        <div class="grid_item"><img src="./assets/photo-3.avif" alt="image" srcset=""></div>
                        <div class="grid_item"><img src="./assets/photo-4.avif" alt="image" srcset=""></div>
                        <div class="grid_item"><img src="./assets/photo-5.avif" alt="image" srcset=""></div>
                        <div class="grid_item"><img src="./assets/photo-6.avif" alt="image" srcset=""></div>
                        <div class="grid_item"><img src="./assets/photo-7.avif" alt="image" srcset=""></div>
                        <div class="grid_item"><img src="./assets/photo-8.avif" alt="image" srcset=""></div>
                        <div class="grid_item"><img src="./assets/photo-9.avif" alt="image" srcset=""></div>
                        <div class="grid_item"><img src="./assets/photo-10.avif" alt="image" srcset=""></div>                       -->

                <!-- =================== IMAGES LOADERS TEMPLATE (ITS NOT VISIBLE ON MAIN PAGE) ==================== -->
                <template id="loading_images_template">
                    <div class="loaders w-full h-[500px] bg-gray-400 mb-4 rounded animate-pulse"></div>
                    <div class="loaders w-full h-[300px] bg-gray-400 mb-4 rounded animate-pulse"></div>
                    <!-- <div
                        class="loading_card w-full my-10 grid justify-center items-center gap-4 text-center sm:col-span-2 lg:col-span-3 animate-pulse">
                        <div class="text-lg text-gray-500 font-semibold flex justify-center items-center gap-2">
                            Loading..
                            <div
                                class="spinner size-[20px] border-3 border-white border-t-gray-500 border-l-gray-500 rounded-full animate-spin">
                            </div>
                        </div>
                    </div> -->
                </template>

                <!-- =================== IMAGES GALLERY ERROR UI TEMPLATE (ITS NOT VISIBLE ON MAIN PAGE) ==================== -->
                <template id="gallery_error_template">
                    <div
                        class="error_card w-full my-35 grid justify-center items-center gap-4 text-center">
                        <div
                            class="error_logo_wrapper size-[80px] flex justify-center items-center rounded-full shadow-sm border border-gray-200 justify-self-center">
                            <i class="ri-cloud-off-line font-semibold text-3xl text-gray-500"></i>
                        </div>
                        <div class="error_massage w-full grid justify-center text-cente">
                            <h1 class="text-lg text-gray-500 font-semibold">Error: something went wrong</h1>
                            <small class="text-gray-400">General error or poor network</small>
                        </div>
                    </div>
                </template>


            </div>
        </section>
    </main>

    <footer class="footer w-full p-4 grid gap-10 bg-gray-100">
        <div class="container grid gap-y-12 justify-center sm:grid-cols-[470px] md:grid-cols-2">
            <div class="footer_data grid gap-8">
                <div class="footer_info grid gap-4 mb-4">
                    <a href="#" class="logo flex items-center gap-2">
                        <i class="ri-image-ai-fill text-2xl"></i>
                        <span class="text-xl md:text-2xl font-semibold">Image Gallery</span>
                    </a>

                    <p class="footer_description">
                        Explore something Beautiful, unique, unwatched, <br> exiting with us every time..
                    </p>
                </div>

                <div class="footer_socials flex gap-x-3">
                    <a href="https://www.linkedin.com/in/siddharth-tayde-7a9547318/" target="_blank"
                        class="social_link">
                        <i class="ri-linkedin-box-fill"></i>
                    </a>

                    <a href="https://www.instagram.com/siddhartxthetic/" target="_blank" class="social_link">
                        <i class="ri-instagram-fill"></i>
                    </a>

                    <a href="https://x.com/SiddharthS21" target="_blank" class="social_link">
                        <i class="ri-twitter-x-line"></i>
                    </a>

                    <a href="https://github.com/Siddharth-taydeS21" target="_blank" class="social_link">
                        <i class="ri-github-fill"></i>
                    </a>
                </div>
            </div>

            <div class="footer_content grid gap-12 md:justify-end">
                <div class="footer_newsLatter xl:w-[350px] text-center">
                    <h3 class="footer_title font-semibold mb-2 text-xl md:text-2xl">Stay Connected</h3>

                    <p class="transition-colors duration-300">
                        Questions or feedback? we'd love <br> to hear from you.
                    </p>

                    <form action=""
                        class="footer_form mt-8 bg-white w-full flex p-3 rounded-md shadow-sm xs:w-[300px] xl:w-[350px]">
                        <input type="email" class="footer_input w-full bg-transparent pl-2 text-title-color"
                            placeholder="Email address">

                        <button
                            class="footer_button size-[35px] rounded-md border border-gray-200 text-xl font-bold shadow-sm transition-colors cursor-pointer">
                            <i class="ri-arrow-right-s-line"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <hr class="text-gray-400 w-full max-w-7xl mx-auto">

        <span class="text-sm text-gray-500 text-center">© 2026 All rights reserved.</span>
    </footer>

    <script type="module" src="./JS/main.js"></script>
